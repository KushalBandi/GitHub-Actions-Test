name: Monthly Python Jobs

on:
  schedule:
    # Runs at 00:00 UTC on the 1st of every month
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  monthly-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Python Script 1
        env:
          TEST_PARAM_1: ${{ secrets.API_USERNAME }}
          TEST_PARAM_2: ${{ secrets.API_PASSWORD }}
          TEST_PARAM_3: ${{ secrets.API_TOKEN }}
        run: |
          python GitHub-Actions-Test/script.py \
            --param_1 "$TEST_PARAM_1" \
            --param_2 "$TEST_PARAM_2" \
            --param_3 "$TEST_PARAM_3"
